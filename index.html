<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナイトレイン ボス+ビルド検索ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      text-align: center;
      padding: 40px 20px;
    }
    .hero h1 {
      font-size: 1.6em;
      color: #8bc34a;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .hero p {
      color: #888;
      font-size: 0.9em;
      margin-bottom: 32px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .menu-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 24px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .menu-card:hover {
      border-color: #8bc34a;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(139,195,74,0.15);
      text-decoration: none;
    }
    .menu-card .icon {
      font-size: 2.4em;
      margin-bottom: 12px;
    }
    .menu-card h2 {
      font-size: 1.1em;
      color: #f0f0f0;
      margin-bottom: 8px;
    }
    .menu-card p {
      font-size: 0.85em;
      color: #888;
      line-height: 1.5;
    }
    .status-bar {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.82em;
      color: #666;
      text-align: center;
      max-width: 900px;
      margin: 24px auto 0;
    }
    .status-bar.loaded {
      color: #8bc34a;
      border-color: #5a8a3a;
    }
    .status-bar.error {
      color: #f88;
      border-color: #8a3a3a;
    }

    /* 接続ボタン */
    #connectBtn {
      width: 100%;
      padding: 10px;
      background: #8bc34a;
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #connectBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* スピナー */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26,26,26,0.3);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="authScreen" style="display:none; position:fixed; inset:0; background:#212121; z-index:999; align-items:center; justify-content:center;">
  <div style="background:#2a2a2a; border:1px solid #8bc34a; border-radius:12px; padding:32px; max-width:360px; width:90%; text-align:center;">
    <div style="font-size:1.8em; margin-bottom:12px;">⚔</div>
    <h2 style="color:#8bc34a; font-size:1.1em; margin-bottom:8px;">NIGHTREIGN TOOL</h2>
    <p style="color:#888; font-size:0.85em; margin-bottom:20px;">接続情報を入力してください</p>
    <input type="text" id="apiUrlInput"
      style="width:100%; padding:10px; background:#1a1a1a; border:1px solid #444; border-radius:6px; color:#e0e0e0; font-size:0.85em; margin-bottom:8px;"
      placeholder="API URL">
    <input type="password" id="tokenInput"
      style="width:100%; padding:10px; background:#1a1a1a; border:1px solid #444; border-radius:6px; color:#e0e0e0; font-size:1em; text-align:center; margin-bottom:12px;"
      placeholder="トークンを入力..."
      onkeydown="if(event.key==='Enter') submitToken()">
    <button id="connectBtn" onclick="submitToken()">接続</button>
    <div id="authError" style="color:#f88; font-size:0.85em; margin-top:8px;"></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <span class="site-title">⚔ NIGHTREIGN TOOL</span>
    <div style="display:flex; align-items:center; gap:10px;">
      <div id="headerStatus" class="text-muted text-small">読み込み中...</div>
      <div class="nav-menu-wrap" id="navMenuWrap">
        <button class="nav-menu-btn" id="navMenuBtn" onclick="toggleNavMenu()">☰</button>
        <div class="nav-dropdown" id="navDropdown">
          <a href="boss.html"><span class="nav-icon">👁</span>ボス情報</a>
          <a href="build.html"><span class="nav-icon">⚔</span>ビルド検索</a>
          <a href="boss.html#field"><span class="nav-icon">🗺</span>フィールドボス辞書</a>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>NIGHTREIGN TOOL</h1>
    <p>エルデンリングナイトレイン ボス+ビルド検索ツール</p>

    <div class="menu-grid">
      <a href="boss.html" class="menu-card">
        <div class="icon">👁</div>
        <h2>ボス情報</h2>
        <p>夜の王・道中ボスの耐性確認<br>1〜2日目から3日目ボスを絞り込み</p>
      </a>

      <a href="build.html" class="menu-card">
        <div class="icon">⚔</div>
        <h2>ビルド検索</h2>
        <p>キャラ・遺物効果・付帯効果から<br>最適なビルドを探す</p>
      </a>

      <a href="boss.html#field" class="menu-card">
        <div class="icon">🗺</div>
        <h2>フィールドボス辞書</h2>
        <p>ファーム中に出会うボスの<br>耐性を確認</p>
      </a>
    </div>

    <div id="statusBar" class="status-bar">
      データを読み込んでいます...
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  function showAuthScreen() {
    document.getElementById('authScreen').style.display = 'flex';
  }

  function hideAuthScreen() {
    document.getElementById('authScreen').style.display = 'none';
  }

  function setConnectBtnLoading(isLoading) {
    const btn = document.getElementById('connectBtn');
    if (isLoading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>接続中...';
    } else {
      btn.disabled = false;
      btn.innerHTML = '接続';
    }
  }

  async function submitToken() {
    const apiUrl = document.getElementById('apiUrlInput').value.trim();
    const token  = document.getElementById('tokenInput').value.trim();

    if (!apiUrl || !token) {
      document.getElementById('authError').textContent = 'API URLとトークンを両方入力してください';
      return;
    }

    setCredentials(apiUrl, token);
    document.getElementById('authError').textContent = '';
    setConnectBtnLoading(true);

    try {
      DB = null; // キャッシュクリア
      await loadData();
    } catch(e) {
      if (e.message === 'TOKEN_INVALID') {
        document.getElementById('authError').textContent = 'トークンまたはURLが正しくありません';
      } else {
        document.getElementById('authError').textContent = 'エラー: ' + e.message;
      }
    } finally {
      setConnectBtnLoading(false);
    }
  }

  async function loadData() {
    const statusBar    = document.getElementById('statusBar');
    const headerStatus = document.getElementById('headerStatus');

    try {
      const db = await initDB();
      hideAuthScreen();
      const buildCount = db.ビルド ? db.ビルド.length : 0;
      const bossCount  = db.夜の王 ? db.夜の王.length : 0;
      statusBar.textContent = `✅ データ読み込み完了 — ボス ${bossCount}件 / ビルド ${buildCount}件`;
      statusBar.className = 'status-bar loaded';
      headerStatus.textContent = '✅ オンライン';
      headerStatus.classList.add('text-green');
    } catch(e) {
      if (e.message === 'TOKEN_NOT_SET') {
        showAuthScreen();
      } else if (e.message === 'TOKEN_INVALID') {
        showAuthScreen();
        document.getElementById('authError').textContent = 'トークンまたはURLが正しくありません';
      } else {
        statusBar.textContent = '❌ データ読み込みに失敗しました: ' + e.message;
        statusBar.className = 'status-bar error';
        headerStatus.textContent = '❌ オフライン';
      }
    }
  }

  window.addEventListener('load', loadData);
</script>
  <script src="js/nav.js"></script>
</body>
</html>
