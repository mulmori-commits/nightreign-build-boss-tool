<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボス情報 — ナイトレイン支援ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 夜の王カード */
    .boss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .boss-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .boss-card:hover {
      border-color: #8bc34a;
      transform: translateY(-2px);
    }
    .boss-card.active-card {
      border-color: #8bc34a;
      box-shadow: 0 0 0 2px rgba(139,195,74,0.3);
    }
    .boss-card h3 {
      font-size: 0.95em;
      color: #f0f0f0;
      margin-bottom: 8px;
    }

    /* 耐性チップ */
    .resist-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .resist-chip {
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.78em;
      font-weight: bold;
    }
    .chip-great  { background: #2d1052; color: #f5ff30; border: 1px solid #7c3aed; } /* ◎ 弱点：紫＋蛍光黄 */
    .chip-good   { background: #2e4a1e; color: #8bc34a; border: 1px solid #5a8a3a; }
    .chip-normal { background: #2a2a2a; color: #aaa;    border: 1px solid #444; }
    .chip-weak   { background: #1a1a1a; color: #555;    border: 1px solid #333; }
    .chip-immune { background: #111;    color: #333;    border: 1px solid #222; }

    /* ボス詳細インラインパネル */
    .boss-detail-panel {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      position: relative;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .detail-close-btn {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
      line-height: 1;
    }
    .detail-close-btn:hover { color: #f88; }

    /* サブボス詳細モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      max-width: 700px;
      width: 100%;
      margin: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
    }
    .modal-close:hover { color: #f88; }
    .modal h2 {
      font-size: 1.1em;
      color: #8bc34a;
      margin-bottom: 12px;
      padding-right: 24px;
    }

    /* 絞り込みツール */
    .narrow-container {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .narrow-day-col {
      flex: 2;
      min-width: 0;
    }
    .narrow-result-col {
      flex: 1;
      position: sticky;
      top: 70px;
    }
    @media (max-width: 900px) {
      .narrow-container { flex-wrap: wrap; }
      .narrow-result-col { flex: 1 1 100%; position: static; }
    }
    .day-section {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .boss-btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .boss-select-btn {
      flex: 0 0 calc(50% - 3px);
      min-height: 44px;
      padding: 8px 10px;
      background: #3e3e3e;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95em;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      text-align: center;
    }
    .boss-select-btn:hover {
      border-color: #8bc34a;
    }
    .boss-select-btn.selected {
      background: #8bc34a;
      color: #1a1a1a;
      border-color: #689f38;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(139,195,74,0.4);
    }
    .dlc-divider {
      width: 100%;
      border-top: 1px dashed #444;
      margin: 6px 0;
    }
    .result-list {
      list-style: none;
    }
    .result-list li {
      background: #333;
      margin-bottom: 6px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.95em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .result-list li:hover {
      background: #3a3a3a;
    }
    .result-list li.no-result {
      color: #888;
      cursor: default;
    }
    .score-badge {
      display: inline-block;
      background: #444;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 0.8em;
      color: #8bc34a;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* フィールドボス */
    .field-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .field-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .field-card:hover {
      border-color: #8bc34a;
    }
    .field-card h4 {
      font-size: 0.9em;
      color: #e0e0e0;
      margin-bottom: 4px;
    }
    .field-card p {
      font-size: 0.78em;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="site-title">⚔ NIGHTREIGN TOOL</a>
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('night')">夜の王</button>
      <button class="tab-btn" onclick="switchTab('narrow')">3日目絞り込み</button>
      <button class="tab-btn" onclick="switchTab('field')" id="fieldTabBtn">フィールドボス</button>
    </nav>
  </div>
</header>

<div class="container">

  <div id="loading" class="loading">データを読み込んでいます</div>
  <div id="errorMsg" class="error-msg hidden"></div>

  <!-- タブ1：夜の王一覧 -->
  <div id="tab-night" class="tab-content active hidden">
    <div class="card">
      <div class="section-title">夜の王一覧</div>
      <div class="filter-group" id="nightFilter">
        <button class="filter-btn active" onclick="filterNight('all', this)">全て</button>
        <button class="filter-btn" onclick="filterNight('Main', this)">Main</button>
        <button class="filter-btn" onclick="filterNight('DLC', this)">DLC</button>
      </div>
    </div>
    <!-- インライン詳細パネル（フィルターとグリッドの間） -->
    <div id="nightBossDetail" class="boss-detail-panel hidden">
      <button class="detail-close-btn" onclick="closeDetail()">×</button>
      <div id="nightBossDetailBody"></div>
    </div>

    <div class="boss-grid" id="nightBossGrid"></div>
  </div>

  <!-- タブ2：3日目絞り込み -->
  <div id="tab-narrow" class="tab-content hidden">
    <div class="narrow-container">
      <div class="narrow-day-col">
        <div class="day-section">
          <div class="section-title">1日目ボス</div>
          <div class="boss-btn-grid" id="day1Btns"></div>
        </div>
        <div class="day-section">
          <div class="section-title">2日目ボス</div>
          <div class="boss-btn-grid" id="day2Btns"></div>
        </div>
      </div>
      <div class="narrow-result-col">
        <div class="card">
          <div class="section-title">絞り込み結果</div>
          <div id="candidateCount" class="score-badge">候補: 10</div>
          <ul id="candidateList" class="result-list">
            <li class="no-result">ボスを選択してください</li>
          </ul>
        </div>
        <div style="text-align:right; margin-top:8px;">
          <button class="btn btn-danger" onclick="resetNarrow()">リセット</button>
        </div>
      </div>
    </div>
  </div>

  <!-- タブ3：フィールドボス -->
  <div id="tab-field" class="tab-content hidden">
    <div class="card">
      <div class="section-title">フィールドボス辞書</div>
      <!-- 種別フィルター -->
      <div class="filter-group" id="fieldTypeFilter" style="margin-bottom:10px;">
        <button class="filter-btn active" onclick="setFieldType('all', this)">全て</button>
        <button class="filter-btn" onclick="setFieldType('フィールド', this)">フィールド</button>
        <button class="filter-btn" onclick="setFieldType('地変', this)">地変</button>
        <button class="filter-btn" onclick="setFieldType('拠点', this)">拠点</button>
        <button class="filter-btn" onclick="setFieldType('大空洞', this)">大空洞</button>
        <button class="filter-btn" onclick="setFieldType('封牢', this)">封牢</button>
        <button class="filter-btn" onclick="setFieldType('襲撃', this)">襲撃</button>
      </div>
      <!-- 五十音フィルター -->
      <div class="filter-group" id="fieldKanaFilter" style="margin-bottom:10px;">
        <button class="filter-btn active" onclick="setFieldKana('all', this)">全て</button>
        <button class="filter-btn" onclick="setFieldKana('あ', this)">あ</button>
        <button class="filter-btn" onclick="setFieldKana('か', this)">か</button>
        <button class="filter-btn" onclick="setFieldKana('さ', this)">さ</button>
        <button class="filter-btn" onclick="setFieldKana('た', this)">た</button>
        <button class="filter-btn" onclick="setFieldKana('な', this)">な</button>
        <button class="filter-btn" onclick="setFieldKana('は', this)">は</button>
        <button class="filter-btn" onclick="setFieldKana('ま', this)">ま</button>
        <button class="filter-btn" onclick="setFieldKana('や', this)">や</button>
        <button class="filter-btn" onclick="setFieldKana('ら', this)">ら</button>
        <button class="filter-btn" onclick="setFieldKana('わ', this)">わ</button>
      </div>
      <!-- テキスト検索 -->
      <input type="text" class="search-box" id="fieldSearch" placeholder="ボス名で検索..." oninput="filterField()">
    </div>
    <div class="field-list" id="fieldList"></div>
  </div>

</div>

<!-- サブボス詳細モーダル（道中ボスチップからのみ使用） -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/boss.js"></script>
<script>
  window.addEventListener('load', async function() {
    try {
      await initDB();
      document.getElementById('loading').classList.add('hidden');
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('hidden'));
      initBossPage();
      const hash = location.hash.replace('#','');
      if (hash === 'field' || hash === 'narrow') {
        switchTab(hash);
      }
    } catch(e) {
      document.getElementById('loading').classList.add('hidden');
      if (e.message === 'TOKEN_NOT_SET' || e.message === 'TOKEN_INVALID') {
        location.href = 'index.html';
        return;
      }
      const err = document.getElementById('errorMsg');
      err.textContent = '❌ データ読み込みに失敗しました: ' + e.message;
      err.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
