<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビルド検索 — ナイトレイン攻略ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ビルドカード */
    .build-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .build-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .build-card:hover { border-color: #8bc34a; transform: translateY(-2px); }
    .build-card.active-card {
      border-color: #8bc34a;
      box-shadow: 0 0 0 2px rgba(139,195,74,0.3);
    }
    .build-card h3 { font-size: 0.95em; color: #f0f0f0; margin-bottom: 6px; }
    .build-card .build-meta { font-size: 0.82em; color: #888; margin-bottom: 8px; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    /* 遺物効果タグ：旧共通バッジ色（オレンジ） */
    .tag-chip {
      padding: 2px 7px;
      background: #3a2a1e;
      color: #d6844a;
      border: 1px solid #8a5a3a;
      border-radius: 4px;
      font-size: 0.78em;
    }
    /* 付帯効果チップ：紫テーマ */
    .sub-chip {
      padding: 2px 7px;
      background: #231040;
      color: #c090e8;
      border: 1px solid #5a3a8a;
      border-radius: 4px;
      font-size: 0.78em;
    }

    /* キャラバッジ */
    .badge-char { background: #2a2a2a; color: #aaa; border: 1px solid #4a4a4a; }
    .badge-char-common { background: #2e4a1e; color: #8bc34a; border: 1px solid #5a8a3a; }
    .filter-btn-common { border-color: #5a8a3a !important; color: #8bc34a !important; }
    .filter-btn-common.active { background-color: #8bc34a !important; color: #1a1a1a !important; }

    /* 絞り込みパネル */
    .filter-panel {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .filter-panel .filter-row { margin-bottom: 10px; }
    .filter-panel label { display: block; font-size: 0.82em; color: #888; margin-bottom: 4px; }

    /* ビルド詳細インラインパネル */
    .build-detail-panel {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .detail-close-btn {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
      line-height: 1;
    }
    .detail-close-btn:hover { color: #f88; }
    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.9em;
      align-items: flex-start;
    }
    .detail-label { color: #888; min-width: 80px; flex-shrink: 0; }
    .detail-value { color: #e0e0e0; flex: 1; }

    /* 付帯効果カテゴリ行 */
    .sub-category-row { margin-bottom: 6px; }
    .sub-category-label { font-size: 0.78em; color: #666; margin-bottom: 3px; }

    /* プール */
    .pool-section {
      background: #1e1e1e;
      border: 1px solid #5a8a3a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      margin-left: -20px;
      margin-right: -20px;
    }
    .pool-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 6px;
    }
    .pool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 900px) {
      .pool-grid { grid-template-columns: 1fr; }
      .pool-section { margin-left: -10px; margin-right: -10px; }
    }
    .pool-card {
      background: #2a2a2a;
      border: 1px solid #3a5a3a;
      border-radius: 10px;
      padding: 16px;
      position: relative;
      font-size: 1em;
      height: 460px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3a5a3a #1e1e1e;
    }
    .pool-card::-webkit-scrollbar { width: 5px; }
    .pool-card::-webkit-scrollbar-track { background: #1e1e1e; }
    .pool-card::-webkit-scrollbar-thumb { background: #3a5a3a; border-radius: 3px; }
    .pool-card h3 { font-size: 1em; color: #f0f0f0; margin-bottom: 8px; padding-right: 24px; }
    .pool-remove-btn {
      position: sticky;
      top: 0;
      float: right;
      background: none;
      border: none;
      color: #666;
      font-size: 1.2em;
      cursor: pointer;
      line-height: 1;
      z-index: 1;
    }
    .pool-remove-btn:hover { color: #f88; }
    .pool-empty-slot {
      background: #222;
      border: 1px dashed #3a3a3a;
      border-radius: 10px;
      height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 0.85em;
    }

    .add-to-pool-btn {
      padding: 6px 14px;
      background: #3a5a3a;
      color: #8bc34a;
      border: 1px solid #5a8a3a;
      border-radius: 6px;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .add-to-pool-btn:hover { background: #4a7a4a; }
    .add-to-pool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .no-result-msg { text-align: center; padding: 40px; color: #666; font-size: 0.9em; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="site-title">⚔ NIGHTREIGN TOOL</a>
  </div>
</header>

<div class="container">

  <div id="loading" class="loading">データを読み込んでいます</div>
  <div id="errorMsg" class="error-msg hidden"></div>

  <div id="mainContent" class="hidden">

    <!-- プールセクション -->
    <div id="poolSection" class="pool-section hidden">
      <div class="pool-header">
        <div class="section-title" style="margin-bottom:0;">選択中のビルド</div>
        <button onclick="clearPool()" class="btn btn-danger" style="padding:4px 12px; font-size:0.82em;">クリア</button>
      </div>
      <div class="pool-grid" id="poolGrid"></div>
    </div>

    <!-- 絞り込みパネル -->
    <div class="filter-panel">
      <div class="section-title" style="margin-bottom:12px;">ビルド検索</div>
      <div class="filter-row">
        <label>キャラ</label>
        <div class="filter-group" id="charaFilter"></div>
      </div>
      <div class="filter-row">
        <label>遺物効果タグ</label>
        <input type="text" class="search-box" id="tagSearch"
          placeholder="効果タグで絞り込み（例：出血、魔術）" oninput="filterBuilds()">
      </div>
      <div class="filter-row">
        <label>推奨付帯効果</label>
        <input type="text" class="search-box" id="subSearch"
          placeholder="付帯効果で絞り込み（例：魔術強化、戦技）" oninput="filterBuilds()">
      </div>
      <div class="text-small text-muted" id="resultCount"></div>
    </div>

    <!-- ビルド詳細インラインパネル -->
    <div id="buildDetail" class="build-detail-panel hidden">
      <button class="detail-close-btn" onclick="closeBuildDetail()">×</button>
      <div id="buildDetailBody"></div>
    </div>

    <!-- ビルド一覧 -->
    <div class="build-grid" id="buildGrid"></div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/build.js"></script>
<script>
  window.addEventListener('load', async function() {
    try {
      await initDB();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      initBuildPage();
    } catch(e) {
      document.getElementById('loading').classList.add('hidden');
      if (e.message === 'TOKEN_NOT_SET' || e.message === 'TOKEN_INVALID') {
        location.href = 'index.html';
        return;
      }
      const err = document.getElementById('errorMsg');
      err.textContent = '❌ データ読み込みに失敗しました: ' + e.message;
      err.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
