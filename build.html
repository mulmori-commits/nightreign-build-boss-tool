<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビルド検索 — ナイトレイン攻略ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ビルドカード */
    .build-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .build-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .build-card:hover {
      border-color: #8bc34a;
      transform: translateY(-2px);
    }
    .build-card.active-card {
      border-color: #8bc34a;
      box-shadow: 0 0 0 2px rgba(139,195,74,0.3);
    }
    .build-card h3 {
      font-size: 0.95em;
      color: #f0f0f0;
      margin-bottom: 6px;
    }
    .build-card .build-meta {
      font-size: 0.82em;
      color: #888;
      margin-bottom: 8px;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    /* 遺物効果タグ：緑テーマ */
    .tag-chip {
      padding: 2px 7px;
      background: #1e3a14;
      color: #7bc23a;
      border: 1px solid #3a5a28;
      border-radius: 4px;
      font-size: 0.78em;
    }
    /* 付帯効果チップ：紫テーマ */
    .sub-chip {
      padding: 2px 7px;
      background: #231040;
      color: #c090e8;
      border: 1px solid #5a3a8a;
      border-radius: 4px;
      font-size: 0.78em;
    }

    /* キャラバッジ：共通は緑、それ以外はニュートラル */
    .badge-char {
      background: #2a2a2a;
      color: #aaa;
      border: 1px solid #4a4a4a;
    }
    .badge-char-common {
      background: #2e4a1e;
      color: #8bc34a;
      border: 1px solid #5a8a3a;
    }

    /* 共通フィルターボタン */
    .filter-btn-common {
      border-color: #5a8a3a !important;
      color: #8bc34a !important;
    }
    .filter-btn-common.active {
      background-color: #8bc34a !important;
      color: #1a1a1a !important;
    }

    /* 絞り込みパネル */
    .filter-panel {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .filter-panel .filter-row {
      margin-bottom: 10px;
    }
    .filter-panel label {
      display: block;
      font-size: 0.82em;
      color: #888;
      margin-bottom: 4px;
    }

    /* ビルド詳細インラインパネル */
    .build-detail-panel {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .detail-close-btn {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
      line-height: 1;
    }
    .detail-close-btn:hover { color: #f88; }

    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.9em;
      align-items: flex-start;
    }
    .detail-label {
      color: #888;
      min-width: 80px;
      flex-shrink: 0;
    }
    .detail-value {
      color: #e0e0e0;
      flex: 1;
    }
    .no-result-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 0.9em;
    }

    /* サブボス詳細モーダル（残存） */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      max-width: 700px;
      width: 100%;
      margin: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
    }
    .modal-close:hover { color: #f88; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="site-title">⚔ NIGHTREIGN TOOL</a>
  </div>
</header>

<div class="container">

  <div id="loading" class="loading">データを読み込んでいます</div>
  <div id="errorMsg" class="error-msg hidden"></div>

  <div id="mainContent" class="hidden">

    <!-- 絞り込みパネル -->
    <div class="filter-panel">
      <div class="section-title" style="margin-bottom:12px;">ビルド検索</div>

      <div class="filter-row">
        <label>キャラ</label>
        <div class="filter-group" id="charaFilter"></div>
      </div>

      <div class="filter-row">
        <label>遺物効果タグ</label>
        <input type="text" class="search-box" id="tagSearch"
          placeholder="効果タグで絞り込み（例：出血、魔術）" oninput="filterBuilds()">
      </div>

      <div class="filter-row">
        <label>推奨付帯効果</label>
        <input type="text" class="search-box" id="subSearch"
          placeholder="付帯効果で絞り込み（例：魔術強化、戦技）" oninput="filterBuilds()">
      </div>

      <div class="text-small text-muted" id="resultCount"></div>
    </div>

    <!-- ビルド詳細インラインパネル（絞り込みとグリッドの間） -->
    <div id="buildDetail" class="build-detail-panel hidden">
      <button class="detail-close-btn" onclick="closeBuildDetail()">×</button>
      <div id="buildDetailBody"></div>
    </div>

    <!-- ビルド一覧 -->
    <div class="build-grid" id="buildGrid"></div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/build.js"></script>
<script>
  window.addEventListener('load', async function() {
    try {
      await initDB();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      initBuildPage();
    } catch(e) {
      document.getElementById('loading').classList.add('hidden');
      if (e.message === 'TOKEN_NOT_SET' || e.message === 'TOKEN_INVALID') {
        location.href = 'index.html';
        return;
      }
      const err = document.getElementById('errorMsg');
      err.textContent = '❌ データ読み込みに失敗しました: ' + e.message;
      err.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
