<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビルド検索 — ナイトレイン攻略ツール</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ビルドカード */
    .build-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .build-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .build-card:hover {
      border-color: #8bc34a;
      transform: translateY(-2px);
    }
    .build-card h3 {
      font-size: 0.95em;
      color: #f0f0f0;
      margin-bottom: 6px;
    }
    .build-card .build-meta {
      font-size: 0.82em;
      color: #888;
      margin-bottom: 8px;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag-chip {
      padding: 2px 7px;
      background: #1e2e3a;
      color: #6ab0d6;
      border: 1px solid #2a4a5a;
      border-radius: 4px;
      font-size: 0.78em;
    }
    .sub-chip {
      padding: 2px 7px;
      background: #2e2a1e;
      color: #d6a84a;
      border: 1px solid #5a4a2a;
      border-radius: 4px;
      font-size: 0.78em;
    }

    /* 絞り込みパネル */
    .filter-panel {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .filter-panel .filter-row {
      margin-bottom: 10px;
    }
    .filter-panel label {
      display: block;
      font-size: 0.82em;
      color: #888;
      margin-bottom: 4px;
    }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: #2a2a2a;
      border: 1px solid #8bc34a;
      border-radius: 12px;
      padding: 20px;
      max-width: 700px;
      width: 100%;
      margin: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 1.4em;
      cursor: pointer;
    }
    .modal-close:hover { color: #f88; }
    .modal h2 {
      font-size: 1.1em;
      color: #8bc34a;
      margin-bottom: 14px;
      padding-right: 24px;
    }
    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.9em;
      align-items: flex-start;
    }
    .detail-label {
      color: #888;
      min-width: 80px;
      flex-shrink: 0;
    }
    .detail-value {
      color: #e0e0e0;
      flex: 1;
    }
    .no-result-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="site-title">⚔ NIGHTREIGN TOOL</a>
  </div>
</header>

<div class="container">

  <div id="loading" class="loading">データを読み込んでいます</div>
  <div id="errorMsg" class="error-msg hidden"></div>

  <div id="mainContent" class="hidden">

    <!-- 絞り込みパネル -->
    <div class="filter-panel">
      <div class="section-title" style="margin-bottom:12px;">ビルド検索</div>

      <!-- キャラ絞り込み -->
      <div class="filter-row">
        <label>キャラ</label>
        <div class="filter-group" id="charaFilter"></div>
      </div>

      <!-- 遺物効果タグ絞り込み -->
      <div class="filter-row">
        <label>遺物効果タグ</label>
        <input type="text" class="search-box" id="tagSearch"
          placeholder="効果タグで絞り込み（例：出血、魔術）" oninput="filterBuilds()">
      </div>

      <!-- 付帯効果絞り込み -->
      <div class="filter-row">
        <label>推奨付帯効果</label>
        <input type="text" class="search-box" id="subSearch"
          placeholder="付帯効果で絞り込み（例：魔術強化、戦技）" oninput="filterBuilds()">
      </div>

      <!-- 件数 -->
      <div class="text-small text-muted" id="resultCount"></div>
    </div>

    <!-- ビルド一覧 -->
    <div class="build-grid" id="buildGrid"></div>

  </div>
</div>

<!-- ビルド詳細モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/build.js"></script>
<script>
  window.addEventListener('load', async function() {
    try {
      await initDB();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      initBuildPage();
    } catch(e) {
      document.getElementById('loading').classList.add('hidden');
      const err = document.getElementById('errorMsg');
      err.textContent = '❌ データ読み込みに失敗しました: ' + e.message;
      err.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
